# Conda environment for the sacsma package (incl. the torch-based sacsma.dpl subpackage).
#   conda env create -f environment.yml
#   conda activate sacsma
#
# Python 3.14 + numba 0.65 + conda-forge pytorch 2.10/cuda130 is the combo verified
# working on this machine (RTX PRO 1000, driver CUDA 13.1).
name: sacsma
channels:
  - conda-forge
dependencies:
  - python=3.14
  # The conda-forge CUDA pytorch builds are MKL-linked (cuda130_mkl), so the old
  # libblas=*=*openblas pin can't hold. The crash it guarded against was the mkl 2026.x
  # PREVIEW ABI mismatch with numpy (2-D matmul / np.linalg delay-load error 0xC06D007F
  # on Windows) - pin mkl below 2026 instead. (The model itself uses no BLAS; this
  # matters only for metrics + matplotlib.)
  - mkl<2026
  - pytorch=2.10.*=cuda130*   # sacsma.dpl differentiable model (GPU training)
  - numpy>=1.24
  - numba>=0.65
  - pandas>=2.0
  - matplotlib>=3.7   # cal/val diagnostics + cross-compare figures
  # gridded forcing store (NetCDF)
  - xarray>=2024.1
  - netcdf4
  # GIS (CalSim catchment layers; Voronoi catchment overlap)
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - scipy>=1.10       # Voronoi spacing + gamma-tail QMAP
  # dev
  - ruff>=0.4
  - pip
  - pip:
      - -e .
